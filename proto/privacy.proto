syntax = "proto3";

package privacy.local;

option java_multiple_files = true;
option java_package = "com.github.fengzhizi319.privacy.localagent.grpc";
option go_package = "github.com/fengzhizi319/privacy-local-agent/proto";

service PrivacyService {
  rpc Mask (MaskRequest) returns (MaskResponse);
  rpc MaskRecord (MaskRecordRequest) returns (MaskRecordResponse);
  rpc Hash (HashRequest) returns (HashResponse);
  rpc DPCount (DPRequest) returns (DPResponse);
  rpc DPSum (DPRequest) returns (DPResponse);
  rpc DPMean (DPRequest) returns (DPResponse);
  rpc DPHistogram (DPHistogramRequest) returns (DPHistogramResponse);
  rpc KAnonymizeRecord (KAnonymizeRequest) returns (KAnonymizeResponse);
  rpc KAnonymizeTable (KAnonymizeTableRequest) returns (KAnonymizeTableResponse);
  rpc ObfuscateQuery (ObfuscateQueryRequest) returns (ObfuscateQueryResponse);
  rpc ClassifyField (ClassifyFieldRequest) returns (ClassifyFieldResponse);
  rpc ClassifyRecord (ClassifyRecordRequest) returns (ClassifyRecordResponse);
  rpc ClassifyTable (ClassifyTableRequest) returns (ClassifyTableResponse);
  rpc Health (HealthRequest) returns (HealthResponse);
  rpc RecommendParams (RecommendRequest) returns (RecommendResponse);
  rpc PerturbBinaryBatch (PerturbBinaryBatchRequest) returns (PerturbBinaryBatchResponse);
  rpc PerturbCategoricalBatch (PerturbCategoricalBatchRequest) returns (PerturbCategoricalBatchResponse);
  rpc EstimateBinaryFrequency (EstimateBinaryFrequencyRequest) returns (EstimateBinaryFrequencyResponse);
  rpc EstimateCategoricalHistogram (EstimateCategoricalHistogramRequest) returns (EstimateCategoricalHistogramResponse);
}

message MaskRequest {
  string field_name = 1;
  string value = 2;
  string context = 3;
}

message MaskResponse {
  string result = 1;
}

message MaskRecordRequest {
  map<string, string> record = 1;
  string context = 2;
}

message MaskRecordResponse {
  map<string, string> result = 1;
}

message HashRequest {
  string value = 1;
  string salt = 2;
}

message HashResponse {
  string result = 1;
}

message DPRequest {
  repeated double values = 1;
  double epsilon = 2;
  string mechanism = 3;
  double delta = 4;
  double clip_lower = 5;
  double clip_upper = 6;
}

message DPResponse {
  double result = 1;
}

message KAnonymizeRequest {
  map<string, string> record = 1;
  repeated string qi_cols = 2;
  int32 k = 3;
}

message KAnonymizeResponse {
  map<string, string> result = 1;
}

message KAnonymizeTableRequest {
  repeated RecordEntry rows = 1;
  repeated string qi_cols = 2;
  int32 k = 3;
  int32 max_depth = 4;
}

message KAnonymizeTableResponse {
  repeated RecordEntry rows = 1;
}

message ObfuscateQueryRequest {
  string query = 1;
  int32 num_dummies = 2;
  string domain = 3;
}

message ObfuscateQueryResponse {
  repeated string result = 1;
}

message ClassifyFieldRequest {
  string field_name = 1;
  string value = 2;
  string params_json = 3;
}

message ClassifyFieldResponse {
  string result_json = 1;
}

message RecordEntry {
  map<string, string> fields = 1;
}

message ClassifyRecordRequest {
  RecordEntry record = 1;
  string params_json = 2;
}

message ClassifyRecordResponse {
  string result_json = 1;
}

message ClassifyTableRequest {
  repeated string schema = 1;
  repeated RecordEntry rows = 2;
  string params_json = 3;
}

message ClassifyTableResponse {
  string result_json = 1;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string namespace = 2;
}

message RecommendRequest {
  string namespace = 1;
  repeated double values = 2;
  repeated RecordEntry rows = 3;
  repeated string qi_cols = 4;
}

message RecommendResponse {
  string status = 1;
  string namespace = 2;
  string recommended_params_json = 3;
}

message PerturbBinaryBatchRequest {
  repeated int32 values = 1;
  double epsilon = 2;
}

message PerturbBinaryBatchResponse {
  repeated int32 results = 1;
}

message PerturbCategoricalBatchRequest {
  repeated string values = 1;
  repeated string categories = 2;
  double epsilon = 3;
}

message PerturbCategoricalBatchResponse {
  repeated string results = 1;
}

message EstimateBinaryFrequencyRequest {
  repeated int32 reported_values = 1;
  double epsilon = 2;
}

message EstimateBinaryFrequencyResponse {
  double estimated_frequency = 1;
}

message EstimateCategoricalHistogramRequest {
  repeated string reported_values = 1;
  repeated string categories = 2;
  double epsilon = 3;
}

message EstimateCategoricalHistogramResponse {
  map<string, double> estimated_histogram = 1;
}

message DPHistogramRequest {
  repeated string values = 1;
  repeated string categories = 2;
  double epsilon = 3;
  string mechanism = 4;
  double delta = 5;
}

message DPHistogramResponse {
  map<string, double> result = 1;
}


