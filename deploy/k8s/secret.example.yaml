# 示例 Secret：复制为 secret.yaml 后替换真实值再 apply。
# TLS Secret 也可使用 kubectl create secret tls 创建。
apiVersion: v1
kind: Secret
metadata:
  name: privacy-local-agent-tls
  namespace: privacy-local-agent
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_YOUR_CERT
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_YOUR_KEY
    -----END PRIVATE KEY-----
---
apiVersion: v1
kind: Secret
metadata:
  name: privacy-local-agent-apikeys
  namespace: privacy-local-agent
type: Opaque
stringData:
  api-keys.json: |
    {
      "my-api-key": {
        "name": "gateway",
        "scopes": ["*"]
      }
    }
