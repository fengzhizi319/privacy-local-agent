apiVersion: v1
kind: Service
metadata:
  name: {{ include "privacy-local-agent.fullname" . }}
  labels:
    {{- include "privacy-local-agent.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.restPort }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.service.exposeGrpc }}
    - port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    {{- end }}
  selector:
    {{- include "privacy-local-agent.selectorLabels" . | nindent 4 }}
